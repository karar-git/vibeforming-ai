<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a1a;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .new-chat-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e5e5e5;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #333;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #888;
        }

        .message.user .message-header { color: #7c9eff; }
        .message.assistant .message-header { color: #10b981; }

        .message-content {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Search info */
        .search-info {
            margin-top: 12px;
            padding: 12px;
            background: #252525;
            border-radius: 8px;
            font-size: 13px;
        }

        .search-queries {
            color: #888;
            margin-bottom: 8px;
        }

        .search-queries span {
            background: #333;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            display: inline-block;
            margin-bottom: 4px;
        }

        .sources {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .source-link {
            color: #7c9eff;
            text-decoration: none;
            font-size: 12px;
            background: #2a2a2a;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .source-link:hover {
            background: #333;
        }

        /* Input area */
        .input-container {
            padding: 16px 24px 24px;
            border-top: 1px solid #333;
            background: #1a1a1a;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        #message-input {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 14px 18px;
            color: #e5e5e5;
            font-size: 15px;
            resize: none;
            min-height: 52px;
            max-height: 200px;
            font-family: inherit;
        }

        #message-input:focus {
            outline: none;
            border-color: #666;
        }

        #message-input::placeholder {
            color: #666;
        }

        #send-btn {
            background: #4f46e5;
            border: none;
            border-radius: 12px;
            width: 52px;
            height: 52px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #4338ca;
        }

        #send-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Chat</h1>
        <button class="new-chat-btn" onclick="newChat()">New Chat</button>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="empty-state" id="empty-state">
            <h2>Start a conversation</h2>
            <p>Ask anything - I can search the web for up-to-date information</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea 
                id="message-input" 
                placeholder="Ask anything..." 
                rows="1"
                onkeydown="handleKeydown(event)"
            ></textarea>
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        let sessionId = localStorage.getItem('chat_session_id');
        let isLoading = false;

        // Auto-resize textarea
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            // Hide empty state
            document.getElementById('empty-state')?.remove();

            // Add user message
            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            // Show loading
            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            const loadingEl = addLoadingIndicator();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message, session_id: sessionId })
                });

                const data = await res.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                // Save session
                sessionId = data.session_id;
                localStorage.setItem('chat_session_id', sessionId);

                // Remove loading, add response
                loadingEl.remove();
                addMessage('assistant', data.response, data.search_queries, data.sources);

            } catch (err) {
                loadingEl.remove();
                addMessage('assistant', 'Error: ' + err.message);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        function addMessage(role, text, searchQueries = [], sources = []) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            let searchHtml = '';
            if (role === 'assistant' && (searchQueries.length > 0 || sources.length > 0)) {
                searchHtml = `
                    <div class="search-info">
                        ${searchQueries.length > 0 ? `
                            <div class="search-queries">
                                Searched: ${searchQueries.map(q => `<span>${escapeHtml(q)}</span>`).join('')}
                            </div>
                        ` : ''}
                        ${sources.length > 0 ? `
                            <div class="sources">
                                ${sources.map(s => `<a href="${escapeHtml(s.url)}" target="_blank" class="source-link">${escapeHtml(s.title || 'Source')}</a>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            div.innerHTML = `
                <div class="message-header">${role === 'user' ? 'You' : 'Assistant'}</div>
                <div class="message-content">${escapeHtml(text)}</div>
                ${searchHtml}
            `;

            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addLoadingIndicator() {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-header">Assistant</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function newChat() {
            sessionId = null;
            localStorage.removeItem('chat_session_id');
            document.getElementById('chat-container').innerHTML = `
                <div class="empty-state" id="empty-state">
                    <h2>Start a conversation</h2>
                    <p>Ask anything - I can search the web for up-to-date information</p>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
