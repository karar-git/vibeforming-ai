<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f0f;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #171717;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        .new-chat-btn, .settings-btn {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e5e5e5;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            margin-bottom: 8px;
        }

        .new-chat-btn:hover, .settings-btn:hover {
            background: #333;
        }

        .settings-btn {
            background: transparent;
            border: 1px solid #3a3a3a;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item:hover {
            background: #2a2a2a;
        }

        .chat-item.active {
            background: #2a2a2a;
            color: #fff;
        }

        .chat-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .delete-chat-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            display: none;
        }

        .chat-item:hover .delete-chat-btn {
            display: block;
        }

        .delete-chat-btn:hover {
            color: #ef4444;
            background: #2a2a2a;
        }

        /* Main area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            font-weight: 600;
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .chat-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .message:hover {
            background: #1a1a1a;
        }

        .message.selected {
            background: #1f1f1f;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message.user .message-header { color: #7c9eff; }
        .message.assistant .message-header { color: #10b981; }

        .message-content {
            line-height: 1.7;
        }

        /* Markdown styles */
        .message-content p { margin-bottom: 12px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content ul, .message-content ol { margin: 12px 0; padding-left: 24px; }
        .message-content li { margin-bottom: 6px; }
        .message-content code {
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
        }
        .message-content pre {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .message-content pre code {
            background: none;
            padding: 0;
        }
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 16px 0 8px;
        }
        .message-content a {
            color: #60a5fa;
        }
        .message-content blockquote {
            border-left: 3px solid #4a4a4a;
            padding-left: 12px;
            margin: 12px 0;
            color: #aaa;
        }

        .search-badge {
            font-size: 11px;
            background: #2563eb20;
            color: #60a5fa;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Input area */
        .input-container {
            padding: 16px 24px 24px;
            border-top: 1px solid #2a2a2a;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        #message-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 16px 60px 16px 20px;
            color: #e5e5e5;
            font-size: 15px;
            resize: none;
            min-height: 56px;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
        }

        #message-input:focus {
            outline: none;
            border-color: #4a4a4a;
        }

        #message-input::placeholder {
            color: #666;
        }

        #send-btn {
            position: absolute;
            right: 12px;
            bottom: 10px;
            background: #4f46e5;
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #4338ca;
        }

        #send-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        #send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Slide panel */
        .slide-panel {
            width: 0;
            background: #171717;
            border-left: 1px solid #2a2a2a;
            overflow: hidden;
            transition: width 0.3s ease;
            flex-shrink: 0;
        }

        .slide-panel.open {
            width: 360px;
        }

        .panel-content {
            width: 360px;
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        .panel-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .close-panel {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 24px;
            line-height: 1;
        }

        .close-panel:hover {
            color: #fff;
        }

        .panel-section {
            margin-bottom: 24px;
        }

        .panel-section h4 {
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .search-query-tag {
            display: inline-block;
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 6px;
            margin: 0 6px 8px 0;
            font-size: 13px;
            color: #ddd;
        }

        .source-item {
            display: block;
            background: #1f1f1f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            text-decoration: none;
            color: #e5e5e5;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
        }

        .source-item:hover {
            background: #252525;
            border-color: #3a3a3a;
        }

        .source-title {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .source-url {
            font-size: 12px;
            color: #60a5fa;
            word-break: break-all;
        }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            width: 500px;
            max-width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
        }

        .modal-body {
            padding: 20px;
        }

        .setting-group {
            margin-bottom: 24px;
        }

        .setting-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #aaa;
        }

        .setting-group small {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .website-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .website-input-row input {
            flex: 1;
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e5e5e5;
            font-size: 14px;
        }

        .website-input-row input:focus {
            outline: none;
            border-color: #4a4a4a;
        }

        .website-input-row button {
            background: #4f46e5;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
        }

        .website-input-row button:hover {
            background: #4338ca;
        }

        .website-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .website-tag {
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .website-tag.preferred {
            border-color: #22c55e40;
            background: #22c55e10;
        }

        .website-tag.prohibited {
            border-color: #ef444440;
            background: #ef444410;
        }

        .website-tag button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
            line-height: 1;
        }

        .website-tag button:hover {
            color: #ef4444;
        }

        /* Loading */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }

        .empty-state h2 {
            font-size: 28px;
            margin-bottom: 12px;
            color: #888;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.hidden {
            display: none;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .slide-panel.open {
                position: fixed;
                right: 0;
                top: 0;
                height: 100%;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="typing-indicator">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-panel" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>Preferred Websites</label>
                    <small>AI will prioritize searching these websites</small>
                    <div class="website-input-row">
                        <input type="text" id="preferred-input" placeholder="e.g. wikipedia.org">
                        <button onclick="addWebsite('preferred')">Add</button>
                    </div>
                    <div class="website-list" id="preferred-list"></div>
                </div>
                <div class="setting-group">
                    <label>Prohibited Websites</label>
                    <small>AI will NOT search these websites</small>
                    <div class="website-input-row">
                        <input type="text" id="prohibited-input" placeholder="e.g. example.com">
                        <button onclick="addWebsite('prohibited')">Add</button>
                    </div>
                    <div class="website-list" id="prohibited-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
            <button class="settings-btn" onclick="openSettings()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v10M1 12h6m6 0h10"></path>
                </svg>
                Settings
            </button>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- Main area -->
    <div class="main">
        <div class="header">AI Chat</div>
        
        <div class="chat-container" id="chat-container">
            <div class="chat-content" id="chat-content">
                <div class="empty-state" id="empty-state">
                    <h2>How can I help you?</h2>
                    <p>Ask anything - I can search the web for up-to-date information</p>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="message-input" 
                    placeholder="Message AI..." 
                    rows="1"
                    onkeydown="handleKeydown(event)"
                ></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Slide panel for search details -->
    <div class="slide-panel" id="slide-panel">
        <div class="panel-content">
            <div class="panel-header">
                <h3>Search Details</h3>
                <button class="close-panel" onclick="closePanel()">&times;</button>
            </div>
            <div id="panel-body"></div>
        </div>
    </div>

    <script>
        // CONFIG - Change this to your Railway backend URL
        const API_URL = 'https://vibeforming-ai-production.up.railway.app';

        let currentChatId = null;
        let chatList = [];
        let currentMessages = [];
        let isLoading = false;

        // Website preferences (stored in localStorage)
        let preferredWebsites = JSON.parse(localStorage.getItem('preferredWebsites') || '[]');
        let prohibitedWebsites = JSON.parse(localStorage.getItem('prohibitedWebsites') || '[]');
        let lastSentPreferred = JSON.parse(localStorage.getItem('lastSentPreferred') || '[]');
        let lastSentProhibited = JSON.parse(localStorage.getItem('lastSentProhibited') || '[]');

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Auto-resize textarea
            const textarea = document.getElementById('message-input');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            // Enter to add websites
            document.getElementById('preferred-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); addWebsite('preferred'); }
            });
            document.getElementById('prohibited-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); addWebsite('prohibited'); }
            });

            renderWebsiteLists();

            // Load chats from server
            await loadChatList();
            document.getElementById('loading-overlay').classList.add('hidden');
        });

        // Settings functions
        function openSettings() {
            document.getElementById('settings-modal').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('open');
        }

        function addWebsite(type) {
            const input = document.getElementById(`${type}-input`);
            const website = input.value.trim().toLowerCase();
            
            if (!website) return;
            
            // Clean up URL
            let cleanUrl = website.replace(/^(https?:\/\/)?(www\.)?/, '').replace(/\/.*$/, '');
            
            if (type === 'preferred') {
                if (!preferredWebsites.includes(cleanUrl)) {
                    preferredWebsites.push(cleanUrl);
                    localStorage.setItem('preferredWebsites', JSON.stringify(preferredWebsites));
                }
            } else {
                if (!prohibitedWebsites.includes(cleanUrl)) {
                    prohibitedWebsites.push(cleanUrl);
                    localStorage.setItem('prohibitedWebsites', JSON.stringify(prohibitedWebsites));
                }
            }
            
            input.value = '';
            renderWebsiteLists();
        }

        function removeWebsite(type, website) {
            if (type === 'preferred') {
                preferredWebsites = preferredWebsites.filter(w => w !== website);
                localStorage.setItem('preferredWebsites', JSON.stringify(preferredWebsites));
            } else {
                prohibitedWebsites = prohibitedWebsites.filter(w => w !== website);
                localStorage.setItem('prohibitedWebsites', JSON.stringify(prohibitedWebsites));
            }
            renderWebsiteLists();
        }

        function renderWebsiteLists() {
            document.getElementById('preferred-list').innerHTML = preferredWebsites.map(w => `
                <span class="website-tag preferred">
                    ${escapeHtml(w)}
                    <button onclick="removeWebsite('preferred', '${escapeHtml(w)}')">&times;</button>
                </span>
            `).join('');
            
            document.getElementById('prohibited-list').innerHTML = prohibitedWebsites.map(w => `
                <span class="website-tag prohibited">
                    ${escapeHtml(w)}
                    <button onclick="removeWebsite('prohibited', '${escapeHtml(w)}')">&times;</button>
                </span>
            `).join('');
        }

        function getNewPreferences() {
            // Check for new preferences that haven't been sent yet
            const newPreferred = preferredWebsites.filter(w => !lastSentPreferred.includes(w));
            const newProhibited = prohibitedWebsites.filter(w => !lastSentProhibited.includes(w));
            
            return { newPreferred, newProhibited };
        }

        function markPreferencesAsSent() {
            // Update last sent after successful message
            lastSentPreferred = [...preferredWebsites];
            lastSentProhibited = [...prohibitedWebsites];
            localStorage.setItem('lastSentPreferred', JSON.stringify(lastSentPreferred));
            localStorage.setItem('lastSentProhibited', JSON.stringify(lastSentProhibited));
        }

        async function loadChatList() {
            try {
                const res = await fetch(`${API_URL}/api/chats`);
                const data = await res.json();
                chatList = data.chats || [];
                renderChatList();
            } catch (err) {
                console.error('Failed to load chats:', err);
            }
        }

        async function loadChat(chatId) {
            try {
                const res = await fetch(`${API_URL}/api/chats/${chatId}`);
                if (!res.ok) throw new Error('Chat not found');
                
                const data = await res.json();
                currentChatId = chatId;
                currentMessages = data.messages || [];
                
                // Reset sent preferences for new chat context
                lastSentPreferred = [];
                lastSentProhibited = [];
                localStorage.setItem('lastSentPreferred', '[]');
                localStorage.setItem('lastSentProhibited', '[]');
                
                closePanel();
                renderMessages();
                renderChatList();
            } catch (err) {
                console.error('Failed to load chat:', err);
            }
        }

        async function createNewChat() {
            try {
                const res = await fetch(`${API_URL}/api/chats`, { method: 'POST' });
                const data = await res.json();
                return data.id;
            } catch (err) {
                console.error('Failed to create chat:', err);
                return null;
            }
        }

        async function deleteChat(chatId, event) {
            event.stopPropagation();
            
            if (!confirm('Delete this chat?')) return;
            
            try {
                await fetch(`${API_URL}/api/chats/${chatId}`, { method: 'DELETE' });
                
                if (currentChatId === chatId) {
                    currentChatId = null;
                    currentMessages = [];
                    showEmptyState();
                }
                
                await loadChatList();
            } catch (err) {
                console.error('Failed to delete chat:', err);
            }
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            // Create new chat if needed
            if (!currentChatId) {
                currentChatId = await createNewChat();
                if (!currentChatId) {
                    alert('Failed to create chat');
                    return;
                }
                // Reset sent preferences for new chat
                lastSentPreferred = [];
                lastSentProhibited = [];
            }

            // Get new preferences to send (only new ones, not already sent)
            const { newPreferred, newProhibited } = getNewPreferences();

            // Hide empty state
            document.getElementById('empty-state')?.remove();

            // Add user message to UI
            const userMsg = { role: 'user', content: message };
            currentMessages.push(userMsg);
            renderMessage(userMsg);
            
            input.value = '';
            input.style.height = 'auto';

            // Show loading
            isLoading = true;
            document.getElementById('send-btn').disabled = true;
            const loadingEl = addLoadingIndicator();

            try {
                const res = await fetch(`${API_URL}/api/chats/${currentChatId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: message,
                        new_preferred: newPreferred,
                        new_prohibited: newProhibited
                    })
                });

                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                // Mark preferences as sent after successful response
                markPreferencesAsSent();

                // Update user message with ID from server
                currentMessages[currentMessages.length - 1] = data.user_message;

                // Add assistant message
                currentMessages.push(data.assistant_message);
                
                loadingEl.remove();
                renderMessage(data.assistant_message);

                // Refresh chat list (title might have changed)
                await loadChatList();

            } catch (err) {
                loadingEl.remove();
                const errorMsg = { role: 'assistant', content: 'Error: ' + err.message };
                currentMessages.push(errorMsg);
                renderMessage(errorMsg);
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        function renderMessages() {
            const container = document.getElementById('chat-content');
            container.innerHTML = '';
            
            if (currentMessages.length === 0) {
                showEmptyState();
                return;
            }
            
            currentMessages.forEach(msg => renderMessage(msg));
            scrollToBottom();
        }

        function renderMessage(msg) {
            const container = document.getElementById('chat-content');
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            
            const hasSearch = msg.role === 'assistant' && 
                ((msg.search_queries && msg.search_queries.length > 0) || 
                 (msg.sources && msg.sources.length > 0));

            div.onclick = () => {
                if (msg.role === 'assistant') {
                    showSearchDetails(msg, div);
                }
            };

            // Parse markdown for assistant messages
            const content = msg.role === 'assistant' 
                ? marked.parse(msg.content || '')
                : escapeHtml(msg.content || '');

            div.innerHTML = `
                <div class="message-header">
                    ${msg.role === 'user' ? 'You' : 'Assistant'}
                    ${hasSearch ? '<span class="search-badge">Web Search</span>' : ''}
                </div>
                <div class="message-content">${content}</div>
            `;

            container.appendChild(div);
            scrollToBottom();
        }

        function showSearchDetails(msg, element) {
            // Remove selected from all
            document.querySelectorAll('.message.selected').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            const panel = document.getElementById('slide-panel');
            const body = document.getElementById('panel-body');

            let html = '';

            if (msg.search_queries && msg.search_queries.length > 0) {
                html += `
                    <div class="panel-section">
                        <h4>Search Queries</h4>
                        <div>${msg.search_queries.map(q => `<span class="search-query-tag">${escapeHtml(q)}</span>`).join('')}</div>
                    </div>
                `;
            }

            if (msg.sources && msg.sources.length > 0) {
                html += `
                    <div class="panel-section">
                        <h4>Sources (${msg.sources.length})</h4>
                        ${msg.sources.map(s => `
                            <a href="${escapeHtml(s.url)}" target="_blank" class="source-item">
                                <div class="source-title">${escapeHtml(s.title || 'Source')}</div>
                                <div class="source-url">${escapeHtml(s.url)}</div>
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            if (!html) {
                html = '<p style="color: #666;">No search was performed for this response.</p>';
            }

            body.innerHTML = html;
            panel.classList.add('open');
        }

        function closePanel() {
            document.getElementById('slide-panel').classList.remove('open');
            document.querySelectorAll('.message.selected').forEach(el => el.classList.remove('selected'));
        }

        function addLoadingIndicator() {
            const container = document.getElementById('chat-content');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'loading-msg';
            div.innerHTML = `
                <div class="message-header">Assistant</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
            return div;
        }

        function newChat() {
            currentChatId = null;
            currentMessages = [];
            // Reset sent preferences for new chat
            lastSentPreferred = [];
            lastSentProhibited = [];
            localStorage.setItem('lastSentPreferred', '[]');
            localStorage.setItem('lastSentProhibited', '[]');
            
            closePanel();
            showEmptyState();
            renderChatList();
            document.getElementById('message-input').focus();
        }

        function showEmptyState() {
            document.getElementById('chat-content').innerHTML = `
                <div class="empty-state" id="empty-state">
                    <h2>How can I help you?</h2>
                    <p>Ask anything - I can search the web for up-to-date information</p>
                </div>
            `;
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            
            list.innerHTML = chatList.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" 
                     onclick="loadChat('${chat.id}')">
                    <span class="chat-item-title">${escapeHtml(chat.title)}</span>
                    <button class="delete-chat-btn" onclick="deleteChat('${chat.id}', event)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        document.getElementById('settings-modal').addEventListener('click', (e) => {
            if (e.target.id === 'settings-modal') closeSettings();
        });
    </script>
</body>
</html>
